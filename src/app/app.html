<div class="small-screen-warning">
  <div class="warning-content">
    <i class="fa-solid fa-desktop warning-icon"></i>
    <h2>Screen Too Small</h2>
    <p>This portfolio is designed as an interactive Desktop OS experience.</p>
    <p>For the best experience, please view it on a larger screen (laptop or desktop).</p>
  </div>
</div>

<div class="app-content">
  <ng-container [ngSwitch]="(systemService.state$ | async)">
    <app-boot-screen   *ngSwitchCase="'booting'"></app-boot-screen>
    <app-lock-screen   *ngSwitchCase="'locked'"></app-lock-screen>
    <app-desktop       *ngSwitchCase="'desktop'"></app-desktop>
  </ng-container>
</div>
