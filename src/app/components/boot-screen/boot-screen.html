<div class="boot-screen">

  <div class="oem-logo-area">
    <!-- Often in 24.04, the manufacturer logo is here, but we'll use the Ubuntu text or logo -->
    <div class="ubuntu-logo">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="white">
        <!-- Ubuntu 22.04/24.04 Circle of Friends Logo -->
        <path d="M 100 22 A 78 78 0 0 1 167.6 139" fill="none" stroke="white" stroke-width="18"
          stroke-linecap="round" />
        <path d="M 167.6 139 A 78 78 0 0 1 32.4 139" fill="none" stroke="white" stroke-width="18"
          stroke-linecap="round" />
        <path d="M 32.4 139 A 78 78 0 0 1 100 22" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" />
        <circle cx="100" cy="22" r="16" />
        <circle cx="167.5" cy="139" r="16" />
        <circle cx="32.5" cy="139" r="16" />
      </svg>
    </div>
  </div>

  <!-- Ubuntu 24.04 (Noble Numbat) BGRT Plymouth spinner (a simple modern circular spinner) -->
  <div class="spinner-area">
    <div class="ubuntu-spinner"></div>
  </div>

  <div class="ubuntu-wordmark">
    <!-- Optional: Ubuntu text logo at the bottom, which is standard in 24.04 if OEM logo is in center -->
    <span class="ubuntu-text">ubuntu</span>
  </div>

</div>
